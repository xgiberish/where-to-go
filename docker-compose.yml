
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: where_to_go
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

backend:
  build:
    context: .
    dockerfile: backend/Dockerfile
  env_file: .env
  ports:
    - "8000:8000"
  depends_on:
    db:
      condition: service_healthy
  volumes:
    - ./backend:/app
    - ./ml/models:/app/models:ro
    - ./data_processing:/data_processing:ro
  environment:
    - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/where_to_go
    - ML_MODEL_PATH=/app/models/travel_style_classifier.joblib
    - PYTHONPATH=/app:/
    
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:
